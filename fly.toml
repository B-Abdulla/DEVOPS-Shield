# fly.toml file generated for devops-shield deployment
app = "devops-shield"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "true"
  PORT = "8080"
  ENVIRONMENT = "production"
  HOST = "0.0.0.0"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["web"]
    type = "requests"
    hard_limit = 1000
    soft_limit = 800

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.tcp_checks]
    interval = "10s"
    timeout = "5s"

[processes]
  web = "cd backend && python main.py"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
