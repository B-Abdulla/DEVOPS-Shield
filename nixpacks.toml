[phases.setup]
nixPkgs = ["python311", "gcc", "postgresql"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
    "chmod +x start.sh"
]

[start]
cmd = "./start.sh"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONPATH = "/app/backend"
