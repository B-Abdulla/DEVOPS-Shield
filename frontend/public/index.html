<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Primary Meta Tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
  <meta name="description" content="DevOps Fraud Shield - Advanced AI-powered security platform for real-time fraud detection and threat protection in DevOps environments" />
  <meta name="keywords" content="DevOps, security, fraud detection, AI, threat protection, cybersecurity, real-time monitoring" />
  <meta name="author" content="Shaik Abdul Sammed" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#2563eb" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://devops-shield.example.com/" />
  <meta property="og:title" content="DevOps Fraud Shield - AI-Powered Security Platform" />
  <meta property="og:description" content="Advanced AI-powered security platform for real-time fraud detection and threat protection in DevOps environments" />
  <meta property="og:image" content="%PUBLIC_URL%/assets/og-image.png" />
  <meta property="og:site_name" content="DevOps Fraud Shield" />
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://devops-shield.example.com/" />
  <meta property="twitter:title" content="DevOps Fraud Shield - AI-Powered Security Platform" />
  <meta property="twitter:description" content="Advanced AI-powered security platform for real-time fraud detection and threat protection" />
  <meta property="twitter:image" content="%PUBLIC_URL%/assets/twitter-image.png" />
  
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/logo.svg" />
  <link rel="shortcut icon" href="%PUBLIC_URL%/logo.svg" />
  
  <!-- Preconnect to External Domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.devops-shield.com" />
  
  <!-- Preload Critical Resources -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" />
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  
  <!-- Title -->
  <title>DevOps Fraud Shield - AI-Powered Security Platform</title>
  
  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "DevOps Fraud Shield",
    "description": "Advanced AI-powered security platform for real-time fraud detection and threat protection in DevOps environments",
    "url": "https://devops-shield.example.com/",
    "applicationCategory": "SecurityApplication",
    "operatingSystem": "Web Browser",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Organization",
      "name": "DevOps Security Team"
    },
    "provider": {
      "@type": "Organization",
      "name": "DevOps Security Solutions"
    }
  }
  </script>
</head>
<body>
  <!-- Main Application Container -->
  <div id="root" role="application" aria-label="DevOps Fraud Shield Application"></div>
  
  <!-- Fallback for no JavaScript -->
  <noscript>
    <div class="noscript-fallback">
      <div class="noscript-content">
        <h1>JavaScript Required</h1>
        <p>DevOps Fraud Shield requires JavaScript to function properly. Please enable JavaScript in your browser settings and reload the page.</p>
        <div class="noscript-features">
          <h3>What you're missing:</h3>
          <ul>
            <li>🛡️ Real-time fraud detection</li>
            <li>🤖 AI-powered threat analysis</li>
            <li>📊 Advanced security dashboard</li>
            <li>🔐 Multi-layer protection</li>
            <li>⚡ Instant threat alerts</li>
          </ul>
        </div>
        <div class="noscript-help">
          <h3>Need help enabling JavaScript?</h3>
          <p>Visit <a href="https://www.enable-javascript.com/" target="_blank" rel="noopener">enable-javascript.com</a> for browser-specific instructions.</p>
        </div>
      </div>
    </div>
    
    <style>
      .noscript-fallback {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        color: #f8fafc;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .noscript-content {
        max-width: 600px;
        padding: 2rem;
        text-align: center;
        background: rgba(30, 41, 59, 0.9);
        border-radius: 1rem;
        border: 1px solid #475569;
        backdrop-filter: blur(10px);
      }
      
      .noscript-content h1 {
        color: #ef4444;
        margin-bottom: 1rem;
        font-size: 2rem;
      }
      
      .noscript-content h3 {
        color: #3b82f6;
        margin: 1.5rem 0 0.5rem 0;
      }
      
      .noscript-content ul {
        text-align: left;
        color: #cbd5e1;
      }
      
      .noscript-content a {
        color: #60a5fa;
        text-decoration: underline;
      }
      
      .noscript-content a:hover {
        color: #93c5fd;
      }
    </style>
  </noscript>
  
  <!-- Performance Monitoring -->
  <script>
    // Performance monitoring
    if ('performance' in window && 'measure' in window.performance) {
      window.addEventListener('load', function() {
        setTimeout(function() {
          const perfData = window.performance.timing;
          const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
          console.log('Page load time:', pageLoadTime + 'ms');
        }, 0);
      });
    }
    
    // Error tracking
    window.addEventListener('error', function(e) {
      console.error('Application error:', e.error);
      // In production, send to error tracking service
    });
    
    // Unhandled promise rejections
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled promise rejection:', e.reason);
      // In production, send to error tracking service
    });
  </script>
  
</body>
</html>
